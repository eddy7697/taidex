apiVersion: apps/v1
kind: Deployment
metadata:
  name: nazodex-web
spec:
  replicas: 1
  selector:
    matchLabels: { app: nazodex-web }
  template:
    metadata:
      labels: { app: nazodex-web }
    spec:
      containers:
        - name: web
          image: REGISTRY/nazodex:latest   # 替換為你的 image
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef: { name: nazodex-secrets }
          readinessProbe:
            httpGet: { path: /login, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: nazodex-web
spec:
  selector: { app: nazodex-web }
  ports:
    - port: 80
      targetPort: 3000
